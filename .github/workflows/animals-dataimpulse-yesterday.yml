name: Animals Scraper — DataImpulse Proxy, Yesterday Data (Kuwait)

on:
  workflow_dispatch:
    inputs:
      output_file:
        description: 'Output JSON filename'
        required: false
        default: 'animals_yesterday_result.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  animals-yesterday-scrape:
    name: Scrape Animals (yesterday) via DataImpulse (KW)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r Animals/requirements.txt

      - name: Run Animals yesterday scraper via DataImpulse proxy
        env:
          # DataImpulse credentials stored as GitHub Secrets
          # __cr.kw suffix geo-targets Kuwait residential IPs
          DATAIMPULSE_USER: ${{ secrets.DATAIMPULSE_USER }}
          DATAIMPULSE_PASS: ${{ secrets.DATAIMPULSE_PASS }}
          DATAIMPULSE_HOST: gw.dataimpulse.com
          DATAIMPULSE_PORT: '823'
        run: |
          cd Animals
          python test_dataimpulse_yesterday.py \
            --output "${{ github.event.inputs.output_file || 'animals_yesterday_result.json' }}"

      - name: Upload scrape output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: animals-yesterday-output-${{ github.run_number }}
          path: Animals/${{ github.event.inputs.output_file || 'animals_yesterday_result.json' }}
          retention-days: 14

      - name: Print request count summary from output
        if: success()
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          output_file = "${{ github.event.inputs.output_file || 'animals_yesterday_result.json' }}"
          path = Path("Animals") / output_file
          if not path.exists():
              print("Output file not found — skipping summary")
              sys.exit(0)

          data  = json.loads(path.read_text(encoding="utf-8"))
          stats = data.get("stats", {})

          print("")
          print("=" * 60)
          print("SCRAPE SUMMARY  —  Yesterday data, all details fetched")
          print("=" * 60)
          print(f"  Target date            : {data.get('target_date', 'N/A')}")
          print(f"  Elapsed time           : {stats.get('elapsed_seconds', 'N/A')}s")
          print(f"  Total HTTP requests    : {stats.get('total_http_requests', 'N/A')}")
          print(f"  Cache hits (free)      : {stats.get('cache_hits_free', 'N/A')}")
          print(f"  All fetches combined   : {stats.get('total_fetches_including_cache', 'N/A')}")
          print(f"  Subcategories scraped  : {stats.get('total_subcategories', 'N/A')}")
          print(f"  Total listings (yest.) : {stats.get('total_listings', 'N/A')}")
          print(f"  Detail pages fetched   : {stats.get('total_detail_fetches', 'N/A')}")
          print("")

          summaries = data.get("subcategory_summary", [])
          if summaries:
              print(f"  {'Category':<32} {'Listings':>8}  {'Details':>7}  {'Pages':>5}")
              print("  " + "-" * 58)
              for s in summaries:
                  name = s.get("name_en") or s.get("name_ar") or s.get("slug", "?")
                  print(
                      f"  {name:<32} {s.get('listings_count', 0):>8}"
                      f"  {s.get('detail_fetches', 0):>7}"
                      f"  {s.get('pages_scraped', 0):>5}"
                  )
          print("")
          EOF
