name: Animals Scraper — DataImpulse Residential Proxy (Kuwait)

on:
  schedule:
    # Run daily at 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Max listing pages per subcategory (0 = unlimited)'
        required: false
        default: '5'
      max_details:
        description: 'Max detail-page fetches per subcategory (0 = skip details)'
        required: false
        default: '0'
      output_file:
        description: 'Output JSON filename'
        required: false
        default: 'animals_dataimpulse_result.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  animals-dataimpulse-scrape:
    name: Scrape Animals via DataImpulse (KW)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r Animals/requirements.txt

      - name: Run Animals scraper via DataImpulse proxy
        env:
          # DataImpulse credentials stored as GitHub Secrets
          # __cr.kw suffix geo-targets Kuwait residential IPs
          DATAIMPULSE_USER: ${{ secrets.DATAIMPULSE_USER }}
          DATAIMPULSE_PASS: ${{ secrets.DATAIMPULSE_PASS }}
          DATAIMPULSE_HOST: gw.dataimpulse.com
          DATAIMPULSE_PORT: '823'
        run: |
          cd Animals
          python test_dataimpulse_proxy.py \
            --max-pages  ${{ github.event.inputs.max_pages  || '5' }} \
            --max-details ${{ github.event.inputs.max_details || '0' }} \
            --output "${{ github.event.inputs.output_file || 'animals_dataimpulse_result.json' }}"

      - name: Upload scrape output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: animals-dataimpulse-output-${{ github.run_number }}
          path: Animals/${{ github.event.inputs.output_file || 'animals_dataimpulse_result.json' }}
          retention-days: 14

      - name: Print request count summary from output
        if: success()
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          output_file = "${{ github.event.inputs.output_file || 'animals_dataimpulse_result.json' }}"
          path = Path("Animals") / output_file
          if not path.exists():
              print("Output file not found — skipping summary")
              sys.exit(0)

          data = json.loads(path.read_text(encoding="utf-8"))
          stats = data.get("stats", {})

          print("")
          print("=" * 50)
          print("SCRAPE SUMMARY")
          print("=" * 50)
          print(f"  Elapsed time          : {stats.get('elapsed_seconds', 'N/A')}s")
          print(f"  Total HTTP requests   : {stats.get('total_http_requests', 'N/A')}")
          print(f"  Cache hits (free)     : {stats.get('cache_hits_free', 'N/A')}")
          print(f"  All fetches combined  : {stats.get('total_fetches_including_cache', 'N/A')}")
          print(f"  Subcategories scraped : {stats.get('total_subcategories', 'N/A')}")
          print(f"  Total listings found  : {stats.get('total_listings', 'N/A')}")
          print(f"  Detail fetches        : {stats.get('total_detail_fetches', 'N/A')}")
          print("")

          summaries = data.get("subcategory_summary", [])
          if summaries:
              print(f"  {'Category':<32} {'Listings':>8}  {'Pages':>5}")
              print("  " + "-" * 50)
              for s in summaries:
                  name = s.get("name_en") or s.get("name_ar") or s.get("slug", "?")
                  print(f"  {name:<32} {s.get('listings_count', 0):>8}  {s.get('pages_scraped', 0):>5}")
          print("")
          EOF
