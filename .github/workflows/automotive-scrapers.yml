name: Automotive Scrapers

on:
  workflow_run:
    workflows: ["General Scrapers"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      category:
        description: 'Specific category to run (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - Automotive-Cars-and-Trucks
          - bikes
          - Wanted-Cars
          - Used Car
          - New Car
          - Rest-Automotive-Part1
          - Rest-Automotive-Part2
          - Rest-Automotive-Part3

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Only run if General Scrapers completed successfully (or if manually triggered)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      matrix:
        category: 
          - Automotive-Cars-and-Trucks
          - bikes
          - Wanted-Cars
          - Used Car
          - New Car
          - Rest-Automotive-Part1
          - Rest-Automotive-Part2
          - Rest-Automotive-Part3
      fail-fast: false  # Continue running other scrapers even if one fails
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run ${{ matrix.category }} scraper
        if: ${{ !github.event.inputs.category || github.event.inputs.category == matrix.category }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          cd "${{ matrix.category }}"
          if [ "${{ matrix.category }}" = "Used Car" ]; then
            python main_used_cars.py
          else
            python main.py
          fi
