name: "Batch A"



on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at 12 AM UTC (triggers the workflow chain)
  workflow_dispatch:

concurrency:
  group: batch-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUTF8: '1'

jobs:

  # ── Job 1: calculate today's geo for Account 1 ──────────────────────────────
  calculate-geo:
    name: Calculate geo rotation (Account 1)
    runs-on: ubuntu-22.04
    outputs:
      geo: ${{ steps.geo.outputs.geo }}
    steps:
      - name: Determine geo from day-of-week
        id: geo
        run: |
          DOW=$(date +%w)   # 0=Sun 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat
          if [ "$DOW" = "0" ]; then
            GEO="eg"        # Sunday
          elif [ $(( DOW % 2 )) = "1" ]; then
            GEO="kw"        # Mon / Wed / Fri
          else
            GEO="sa"        # Tue / Thu / Sat
          fi
          echo "geo=$GEO" >> $GITHUB_OUTPUT
          echo "====================================="
          echo "Account 1 | Day=$DOW | Geo=__cr.$GEO"
          echo "====================================="

  # ── Job 2: run all Batch A scrapers ─────────────────────────────────────────
  scrape:
    name: Scrape Batch A
    needs: calculate-geo
    runs-on: ubuntu-22.04
    env:
      DATAIMPULSE_USER: ${{ secrets.DATAIMPULSE_USER_1 }}__cr.${{ needs.calculate-geo.outputs.geo }}
      DATAIMPULSE_PASS: ${{ secrets.DATAIMPULSE_PASS_1 }}
      DATAIMPULSE_HOST: gw.dataimpulse.com
      DATAIMPULSE_PORT: '823'
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r CFl_data/requirements.txt

      - name: Random start delay (0–30 min stealth offset)
        run: |
          DELAY=$((RANDOM % 1800))
          echo "Waiting ${DELAY}s before starting..."
          sleep $DELAY

      - name: "[1/8] Animals"
        continue-on-error: true
        run: cd CFl_data/Animals && python main.py

      - name: "[2/8] Bikes"
        continue-on-error: true
        run: cd CFl_data/bikes && python main.py

      - name: "[3/8] Gifts"
        continue-on-error: true
        run: cd CFl_data/Gifts && python main.py

      - name: "[4/8] Camping"
        continue-on-error: true
        run: cd CFl_data/Camping && python main.py

      - name: "[5/8] Property"
        continue-on-error: true
        run: cd CFl_data/Property && python main.py

      - name: "[6/8] New Car"
        continue-on-error: true
        run: cd "CFl_data/New Car" && python main.py

      - name: "[7/8] Rest-Automotive-Part1"
        continue-on-error: true
        run: cd CFl_data/Rest-Automotive-Part1 && python main.py

      - name: "[8/8] Jobs"
        continue-on-error: true
        run: cd CFl_data/Jobs && python main.py

      - name: Batch A summary
        if: always()
        run: |
          echo "====================================="
          echo "BATCH A COMPLETE"
          echo "====================================="
