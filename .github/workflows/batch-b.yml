name: "Batch B"



on:
  workflow_run:
    workflows:
      - "Batch A — Animals / Bikes / Camping / Property / New Car / Rest-Automotive-Part1 / Jobs"
    types:
      - completed
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Job 1: calculate today's geo for Account 2 ──────────────────────────────
  calculate-geo:
    name: Calculate geo rotation (Account 2)
    runs-on: ubuntu-22.04
    outputs:
      geo: ${{ steps.geo.outputs.geo }}
    steps:
      - name: Determine geo from day-of-week
        id: geo
        run: |
          DOW=$(date +%w)   # 0=Sun 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat
          if [ "$DOW" = "0" ]; then
            GEO="kw"        # Sunday
          elif [ $(( DOW % 2 )) = "1" ]; then
            GEO="sa"        # Mon / Wed / Fri
          else
            GEO="eg"        # Tue / Thu / Sat
          fi
          echo "geo=$GEO" >> $GITHUB_OUTPUT
          echo "====================================="
          echo "Account 2 | Day=$DOW | Geo=__cr.$GEO"
          echo "====================================="

  # ── Job 2: run all Batch B scrapers ─────────────────────────────────────────
  scrape:
    name: Scrape Batch B
    needs: calculate-geo
    runs-on: ubuntu-22.04
    env:
      DATAIMPULSE_USER: ${{ secrets.DATAIMPULSE_USER_2 }}__cr.${{ needs.calculate-geo.outputs.geo }}
      DATAIMPULSE_PASS: ${{ secrets.DATAIMPULSE_PASS_2 }}
      DATAIMPULSE_HOST: gw.dataimpulse.com
      DATAIMPULSE_PORT: '823'
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r CFl_data/requirements.txt

      - name: Random gap after Batch A (25–45 min stealth pause)
        run: |
          DELAY=$((RANDOM % 1200 + 1500))
          echo "Waiting ${DELAY}s (~$(( DELAY / 60 )) min) before starting Batch B..."
          sleep $DELAY

      - name: "[1/7] Others"
        run: cd CFl_data/Others && python main.py

      - name: "[2/7] Education"
        run: cd CFl_data/Education && python main.py

      - name: "[3/7] Used Car"
        run: cd "CFl_data/Used Car" && python main.py

      - name: "[4/7] Fashion-and-Family"
        run: cd "CFl_data/Fashion-and-Family" && python main.py

      - name: "[5/7] Services"
        run: cd CFl_data/Services && python main.py

      - name: "[6/7] Contracting"
        run: cd CFl_data/Contracting && python main.py

      - name: "[7/7] Rest-Automotive-Part2"
        run: cd CFl_data/Rest-Automotive-Part2 && python main.py

      - name: Batch B summary
        if: always()
        run: |
          echo "====================================="
          echo "BATCH B COMPLETE"
          echo "Account : DATAIMPULSE_USER_2"
          echo "Geo     : __cr.${{ needs.calculate-geo.outputs.geo }}"
          echo "====================================="
