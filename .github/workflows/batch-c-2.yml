name: "Batch C-2"


on:
  workflow_dispatch:

permissions:
  actions: write

concurrency:
  group: batch-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUTF8: '1'

jobs:

  # ── Job 1: calculate today's geo for Account 3 ──────────────────────────────
  calculate-geo:
    name: Calculate geo rotation (Account 3)
    runs-on: ubuntu-22.04
    outputs:
      geo: ${{ steps.geo.outputs.geo }}
    steps:
      - name: Determine geo from day-of-week
        id: geo
        run: |
          DOW=$(date +%w)   # 0=Sun 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat
          if [ "$DOW" = "0" ]; then
            GEO="sa"        # Sunday
          elif [ $(( DOW % 2 )) = "1" ]; then
            GEO="eg"        # Mon / Wed / Fri
          else
            GEO="kw"        # Tue / Thu / Sat
          fi
          echo "geo=$GEO" >> $GITHUB_OUTPUT
          echo "====================================="
          echo "Account 3 | Day=$DOW | Geo=__cr.$GEO"
          echo "====================================="

  # ── Job 2: run Batch C-2 scrapers ────────────────────────────────────────────
  scrape:
    name: Scrape Batch C-2
    needs: calculate-geo
    runs-on: ubuntu-22.04
    env:
      DATAIMPULSE_USER: ${{ secrets.DATAIMPULSE_USER_3 }}__cr.${{ needs.calculate-geo.outputs.geo }}
      DATAIMPULSE_PASS: ${{ secrets.DATAIMPULSE_PASS_3 }}
      DATAIMPULSE_HOST: gw.dataimpulse.com
      DATAIMPULSE_PORT: '823'
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r CFl_data/requirements.txt

      - name: Random gap after Batch C-1 (25–45 min stealth pause)
        run: |
          DELAY=$((RANDOM % 1200 + 1500))
          echo "Waiting ${DELAY}s (~$(( DELAY / 60 )) min) before starting Batch C-2..."
          sleep $DELAY

      - name: "[1/6] Automotive-Cars-and-Trucks"
        continue-on-error: true
        run: cd "CFl_data/Automotive-Cars-and-Trucks" && python main.py

      - name: "[2/6] Electronics"
        continue-on-error: true
        run: cd CFl_data/Electronics && python main.py

      - name: "[3/6] Wanted-Cars"
        continue-on-error: true
        run: cd CFl_data/Wanted-Cars && python main.py

      - name: "[4/6] Furniture"
        continue-on-error: true
        run: cd CFl_data/Furniture && python main.py

      - name: "[5/6] Commercials"
        continue-on-error: true
        run: cd CFl_data/Commercials && python main.py

      - name: "[6/6] Rest-Automotive-Part3"
        continue-on-error: true
        run: cd CFl_data/Rest-Automotive-Part3 && python main.py

      - name: Trigger Schema Monitor
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "monitor.yml" --repo "${{ github.repository }}"

      - name: Batch C-2 summary
        if: always()
        run: |
          echo "====================================="
          echo "BATCH C-2 COMPLETE"
          echo "====================================="
