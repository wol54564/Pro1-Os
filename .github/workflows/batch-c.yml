name: "Batch C — Automotive-Cars-and-Trucks / Dalil / Others / Wanted-Cars / Furniture / Commercials / Rest-Automotive-Part3"

# Batch C is triggered automatically when Batch B completes successfully.
# Account 3 geo rotates with a +2 offset vs Account 1:
#   Mon/Wed/Fri → __cr.eg   (Egypt)
#   Tue/Thu/Sat → __cr.kw   (Kuwait)
#   Sun         → __cr.sa   (Saudi Arabia)

on:
  workflow_run:
    workflows:
      - "Batch B — Electronics / Education / Used Car / Fashion-and-Family / Services / Contracting / Rest-Automotive-Part2"
    types:
      - completed
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Job 1: calculate today's geo for Account 3 ──────────────────────────────
  calculate-geo:
    name: Calculate geo rotation (Account 3)
    runs-on: ubuntu-22.04
    outputs:
      geo: ${{ steps.geo.outputs.geo }}
    steps:
      - name: Determine geo from day-of-week
        id: geo
        run: |
          DOW=$(date +%w)   # 0=Sun 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat
          if [ "$DOW" = "0" ]; then
            GEO="sa"        # Sunday
          elif [ $(( DOW % 2 )) = "1" ]; then
            GEO="eg"        # Mon / Wed / Fri
          else
            GEO="kw"        # Tue / Thu / Sat
          fi
          echo "geo=$GEO" >> $GITHUB_OUTPUT
          echo "====================================="
          echo "Account 3 | Day=$DOW | Geo=__cr.$GEO"
          echo "====================================="

  # ── Job 2: run all Batch C scrapers ─────────────────────────────────────────
  scrape:
    name: Scrape Batch C
    needs: calculate-geo
    runs-on: ubuntu-22.04
    env:
      DATAIMPULSE_USER: ${{ secrets.DATAIMPULSE_USER_3 }}__cr.${{ needs.calculate-geo.outputs.geo }}
      DATAIMPULSE_PASS: ${{ secrets.DATAIMPULSE_PASS_3 }}
      DATAIMPULSE_HOST: gw.dataimpulse.com
      DATAIMPULSE_PORT: '823'
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r CFl_data/requirements.txt

      - name: Random gap after Batch B (25–45 min stealth pause)
        run: |
          DELAY=$((RANDOM % 1200 + 1500))
          echo "Waiting ${DELAY}s (~$(( DELAY / 60 )) min) before starting Batch C..."
          sleep $DELAY

      - name: "[1/7] Automotive-Cars-and-Trucks"
        run: cd "CFl_data/Automotive-Cars-and-Trucks" && python main.py

      - name: "[2/7] Dalil"
        run: cd CFl_data/Dalil && python main.py

      - name: "[3/7] Others"
        run: cd CFl_data/Others && python main.py

      - name: "[4/7] Wanted-Cars"
        run: cd CFl_data/Wanted-Cars && python main.py

      - name: "[5/7] Furniture"
        run: cd CFl_data/Furniture && python main.py

      - name: "[6/7] Commercials"
        run: cd CFl_data/Commercials && python main.py

      - name: "[7/7] Rest-Automotive-Part3"
        run: cd CFl_data/Rest-Automotive-Part3 && python main.py

      - name: Batch C summary
        if: always()
        run: |
          echo "====================================="
          echo "BATCH C COMPLETE"
          echo "Account : DATAIMPULSE_USER_3"
          echo "Geo     : __cr.${{ needs.calculate-geo.outputs.geo }}"
          echo "====================================="
