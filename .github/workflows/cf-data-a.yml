name: "CF-Data Batch A"

# Mirrors Batch A but uses CF_Data/ (proxy.cheap rotating residential).
# Proxy account: PC_PROXY_USER_1 / PC_PROXY_PASS_1
# Scrapers: Animals, Bikes, Gifts, Camping, Property, New Car,
#           Rest-Automotive-Part1, Jobs, Sport

on:
  schedule:
    - cron: '0 0 * * *'   
  workflow_dispatch:

concurrency:
  group: cf-data-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUTF8: '1'

jobs:

  scrape:
    name: "CF-Data Batch A — proxy.cheap account 1"
    runs-on: ubuntu-22.04
    env:
      PROXY_HOST: ${{ secrets.PC_PROXY_HOST }}
      PROXY_PORT: ${{ secrets.PC_PROXY_PORT }}
      PROXY_USER: ${{ secrets.PC_PROXY_USER_1 }}
      PROXY_PASS: ${{ secrets.PC_PROXY_PASS_1 }}
      CF_R2_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL:      ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME:       ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r CF_Data/requirements.txt

      - name: Random start delay (0–20 min stealth offset)
        run: |
          DELAY=$((RANDOM % 1200))
          echo "Waiting ${DELAY}s before starting..."
          sleep $DELAY

      - name: "[1/9] Animals"
        continue-on-error: true
        run: cd CF_Data/Animals && python main.py

      - name: "[2/9] Bikes"
        continue-on-error: true
        run: cd CF_Data/bikes && python main.py

      - name: "[3/9] Gifts"
        continue-on-error: true
        run: cd CF_Data/gifts && python main.py

      - name: "[4/9] Camping"
        continue-on-error: true
        run: cd CF_Data/Camping && python main.py

      - name: "[5/9] Property"
        continue-on-error: true
        run: cd CF_Data/Property && python main.py

      - name: "[6/9] New Car"
        continue-on-error: true
        run: cd "CF_Data/New Car" && python main.py

      - name: "[7/9] Rest-Automotive-Part1"
        continue-on-error: true
        run: cd CF_Data/Rest-Automotive-Part1 && python main.py

      - name: "[8/9] Jobs"
        continue-on-error: true
        run: cd CF_Data/Jobs && python main.py

      - name: "[9/9] Sport"
        continue-on-error: true
        run: cd CF_Data/Sport && python main.py

      - name: CF-Data Batch A summary
        if: always()
        run: |
          echo "====================================="
          echo "CF-DATA BATCH A COMPLETE"
          echo "Proxy account : PC_PROXY_USER_1"
          echo "====================================="
