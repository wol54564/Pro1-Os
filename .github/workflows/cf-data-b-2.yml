name: "CF-Data Batch B-2"

# Triggered automatically after CF-Data Batch B-1 completes.
# Credential rotates daily (offset 1): Sun‚Üí2, Mon‚Üí3, Tue‚Üí1, Wed‚Üí2, ‚Ä¶
# Scrapers: Others, Education, Fashion-and-Family, Services,
#           Contracting, Rest-Automotive-Part2

on:
  workflow_run:
    workflows:
      - "CF-Data Batch B-1"
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: cf-data-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUTF8: '1'

jobs:

  # ‚îÄ‚îÄ Pick today's proxy account (offset 1) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  select-credential:
    name: Select proxy credential
    runs-on: ubuntu-22.04
    outputs:
      account: ${{ steps.pick.outputs.account }}
    steps:
      - name: Pick account from day-of-week
        id: pick
        run: |
          DOW=$(date +%w)                        # 0=Sun ‚Ä¶ 6=Sat
          ACCOUNT=$(( ((DOW + 1) % 3) + 1 ))    # offset 1 ‚Üí 2/3/1
          echo "account=$ACCOUNT" >> $GITHUB_OUTPUT
          echo "Day=$DOW  ‚Üí  Using proxy account $ACCOUNT"

  # ‚îÄ‚îÄ Scrape ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  scrape:
    name: "CF-Data Batch B-2 ‚Äî scrape"
    needs: select-credential
    runs-on: ubuntu-22.04
    env:
      PROXY_HOST: ${{ secrets.PC_PROXY_HOST }}
      PROXY_PORT: ${{ secrets.PC_PROXY_PORT }}
      PROXY_USER: >-
        ${{
          needs.select-credential.outputs.account == '2' && secrets.PC_PROXY_USER_2 ||
          needs.select-credential.outputs.account == '3' && secrets.PC_PROXY_USER_3 ||
          secrets.PC_PROXY_USER_1
        }}
      PROXY_PASS: >-
        ${{
          needs.select-credential.outputs.account == '2' && secrets.PC_PROXY_PASS_2 ||
          needs.select-credential.outputs.account == '3' && secrets.PC_PROXY_PASS_3 ||
          secrets.PC_PROXY_PASS_1
        }}
      CF_R2_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL:      ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME:       ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r CF_Data/requirements.txt

      - name: Random gap after Batch B-1 (25‚Äì45 min stealth pause)
        run: |
          DELAY=$((RANDOM % 1200 + 1500))
          echo "Waiting ${DELAY}s (~$(( DELAY / 60 )) min) before starting CF-Data Batch B-2..."
          sleep $DELAY

      - name: "[1/6] Others"
        continue-on-error: true
        run: cd CF_Data/Others && python main.py

      - name: "[2/6] Education"
        continue-on-error: true
        run: cd CF_Data/Education && python main.py

      - name: "[3/6] Fashion-and-Family"
        continue-on-error: true
        run: cd "CF_Data/Fashion-and-Family" && python main.py

      - name: "[4/6] Services"
        continue-on-error: true
        run: cd CF_Data/Services && python main.py

      - name: "[5/6] Contracting"
        continue-on-error: true
        run: cd CF_Data/Contracting && python main.py

      - name: "[6/6] Rest-Automotive-Part2"
        continue-on-error: true
        run: cd CF_Data/Rest-Automotive-Part2 && python main.py

      - name: CF-Data Batch B-2 summary
        if: always()
        run: |
          echo "====================================="
          echo "CF-DATA BATCH B-2 COMPLETE"
          echo "Proxy account: ${{ needs.select-credential.outputs.account }}"
          echo "====================================="
