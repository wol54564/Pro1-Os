name: "CF-Data Batch B-2"

# Triggered automatically after CF-Data Batch B-1 completes.
# Proxy account: PC_PROXY_USER_2 / PC_PROXY_PASS_2
# Scrapers: Others, Education, Fashion-and-Family, Services,
#           Contracting, Rest-Automotive-Part2

on:
  workflow_run:
    workflows:
      - "CF-Data Batch B-1"
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: cf-data-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUTF8: '1'

jobs:

  scrape:
    name: "CF-Data Batch B-2 — proxy.cheap account 2"
    runs-on: ubuntu-22.04
    env:
      PROXY_HOST: ${{ secrets.PC_PROXY_HOST }}
      PROXY_PORT: ${{ secrets.PC_PROXY_PORT }}
      PROXY_USER: ${{ secrets.PC_PROXY_USER_2 }}
      PROXY_PASS: ${{ secrets.PC_PROXY_PASS_2 }}
      CF_R2_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL:      ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME:       ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r CF_Data/requirements.txt

      - name: Random gap after Batch B-1 (25–45 min stealth pause)
        run: |
          DELAY=$((RANDOM % 1200 + 1500))
          echo "Waiting ${DELAY}s (~$(( DELAY / 60 )) min) before starting CF-Data Batch B-2..."
          sleep $DELAY

      - name: "[1/6] Others"
        continue-on-error: true
        run: cd CF_Data/Others && python main.py

      - name: "[2/6] Education"
        continue-on-error: true
        run: cd CF_Data/Education && python main.py

      - name: "[3/6] Fashion-and-Family"
        continue-on-error: true
        run: cd "CF_Data/Fashion-and-Family" && python main.py

      - name: "[4/6] Services"
        continue-on-error: true
        run: cd CF_Data/Services && python main.py

      - name: "[5/6] Contracting"
        continue-on-error: true
        run: cd CF_Data/Contracting && python main.py

      - name: "[6/6] Rest-Automotive-Part2"
        continue-on-error: true
        run: cd CF_Data/Rest-Automotive-Part2 && python main.py

      - name: CF-Data Batch B-2 summary
        if: always()
        run: |
          echo "====================================="
          echo "CF-DATA BATCH B-2 COMPLETE"
          echo "Proxy account : PC_PROXY_USER_2"
          echo "====================================="
