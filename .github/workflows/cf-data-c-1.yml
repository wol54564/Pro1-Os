name: "CF-Data Batch C-1"

# Triggered automatically after CF-Data Batch B-2 completes.
# Credential rotates daily (offset 2): Sun→3, Mon→1, Tue→2, Wed→3, …
# Scrapers: Dalil
# Triggers CF-Data Batch C-2 when done.

on:
  workflow_run:
    workflows:
      - "CF-Data Batch B-2"
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: write

concurrency:
  group: cf-data-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUTF8: '1'

jobs:

  # ── Pick today's proxy account (offset 2) ───────────────────────────────────
  select-credential:
    name: Select proxy credential
    runs-on: ubuntu-22.04
    outputs:
      account: ${{ steps.pick.outputs.account }}
    steps:
      - name: Pick account from day-of-week
        id: pick
        run: |
          DOW=$(date +%w)                        # 0=Sun … 6=Sat
          ACCOUNT=$(( ((DOW + 2) % 3) + 1 ))    # offset 2 → 3/1/2
          echo "account=$ACCOUNT" >> $GITHUB_OUTPUT
          echo "Day=$DOW  →  Using proxy account $ACCOUNT"

  # ── Scrape ──────────────────────────────────────────────────────────────────
  scrape:
    name: "CF-Data Batch C-1 — scrape"
    needs: select-credential
    runs-on: ubuntu-22.04
    env:
      PROXY_HOST: ${{ secrets.PC_PROXY_HOST }}
      PROXY_PORT: ${{ secrets.PC_PROXY_PORT }}
      PROXY_USER: >-
        ${{
          needs.select-credential.outputs.account == '2' && secrets.PC_PROXY_USER_2 ||
          needs.select-credential.outputs.account == '3' && secrets.PC_PROXY_USER_3 ||
          secrets.PC_PROXY_USER_1
        }}
      PROXY_PASS: >-
        ${{
          needs.select-credential.outputs.account == '2' && secrets.PC_PROXY_PASS_2 ||
          needs.select-credential.outputs.account == '3' && secrets.PC_PROXY_PASS_3 ||
          secrets.PC_PROXY_PASS_1
        }}
      CF_R2_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL:      ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME:       ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r CF_Data/requirements.txt

      - name: Random gap after Batch B-2 (25–45 min stealth pause)
        run: |
          DELAY=$((RANDOM % 1200 + 1500))
          echo "Waiting ${DELAY}s (~$(( DELAY / 60 )) min) before starting CF-Data Batch C-1..."
          sleep $DELAY

      - name: "[1/1] Dalil"
        continue-on-error: true
        run: cd CF_Data/Dalil && python main.py

      - name: Trigger CF-Data Batch C-2
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "cf-data-c-2.yml" --repo "${{ github.repository }}"

      - name: CF-Data Batch C-1 summary
        if: always()
        run: |
          echo "====================================="
          echo "CF-DATA BATCH C-1 COMPLETE"
          echo "Proxy account: ${{ needs.select-credential.outputs.account }}"
          echo "====================================="
