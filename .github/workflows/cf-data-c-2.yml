name: "CF-Data Batch C-2"

# Triggered by CF-Data Batch C-1 (or manually).
# Proxy account: PC_PROXY_USER_3 / PC_PROXY_PASS_3
# Scrapers: Automotive-Cars-and-Trucks, Electronics, Wanted-Cars,
#           Furniture, Commercials, Rest-Automotive-Part3

on:
  workflow_dispatch:

concurrency:
  group: cf-data-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUTF8: '1'

jobs:

  scrape:
    name: "CF-Data Batch C-2 — proxy.cheap account 3"
    runs-on: ubuntu-22.04
    env:
      PROXY_HOST: ${{ secrets.PC_PROXY_HOST }}
      PROXY_PORT: ${{ secrets.PC_PROXY_PORT }}
      PROXY_USER: ${{ secrets.PC_PROXY_USER_3 }}
      PROXY_PASS: ${{ secrets.PC_PROXY_PASS_3 }}
      CF_R2_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL:      ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME:       ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r CF_Data/requirements.txt

      - name: Random gap after Batch C-1 (25–45 min stealth pause)
        run: |
          DELAY=$((RANDOM % 1200 + 1500))
          echo "Waiting ${DELAY}s (~$(( DELAY / 60 )) min) before starting CF-Data Batch C-2..."
          sleep $DELAY

      - name: "[1/6] Automotive-Cars-and-Trucks"
        continue-on-error: true
        run: cd "CF_Data/Automotive-Cars-and-Trucks" && python main.py

      - name: "[2/6] Electronics"
        continue-on-error: true
        run: cd CF_Data/Electronics && python main.py

      - name: "[3/6] Wanted-Cars"
        continue-on-error: true
        run: cd CF_Data/Wanted-Cars && python main.py

      - name: "[4/6] Furniture"
        continue-on-error: true
        run: cd CF_Data/Furniture && python main.py

      - name: "[5/6] Commercials"
        continue-on-error: true
        run: cd CF_Data/Commercials && python main.py

      - name: "[6/6] Rest-Automotive-Part3"
        continue-on-error: true
        run: cd CF_Data/Rest-Automotive-Part3 && python main.py

      - name: CF-Data Batch C-2 summary
        if: always()
        run: |
          echo "====================================="
          echo "CF-DATA BATCH C-2 COMPLETE"
          echo "Proxy account : PC_PROXY_USER_3"
          echo "====================================="
