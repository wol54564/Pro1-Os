name: General Scrapers

on:
  schedule:
    - cron: '0 3 * * *'  # Run daily at 3 AM UTC (triggers the workflow chain)
  workflow_dispatch:
    inputs:
      category:
        description: 'Specific category to run (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - Animals
          - Camping
          - Jobs
          - Education
          - Electronics
          - Fashion-and-Family
          - Furniture
          - Others
          - Commercials
          - Contracting

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        category: 
          - Animals
          - Camping
          - Jobs
          - Education
          - Electronics
          - Fashion-and-Family
          - Furniture
          - Others
          - Commercials
          - Contracting
      fail-fast: false  # Continue running other scrapers even if one fails
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run ${{ matrix.category }} scraper
        if: ${{ !github.event.inputs.category || github.event.inputs.category == matrix.category }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: cd "${{ matrix.category }}" && python main.py
