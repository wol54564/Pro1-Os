name: "Monitor Hub — Aggregate All Sites"

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Listing date to aggregate (YYYY-MM-DD). Leave blank for yesterday."
        required: false
        default: ""
      backfill:
        description: "Backfill Parquet exports for multiple days (instead of single date)"
        type: boolean
        required: false
        default: false
      backfill_days:
        description: "Days to backfill when backfill is enabled"
        required: false
        default: "30"

concurrency:
  group: monitor-hub
  cancel-in-progress: false

env:
  PYTHONUTF8: "1"

jobs:
  aggregate:
    name: "Merge reports and export dashboard tables"
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch'
    env:
      CF_R2_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL:      ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME:       ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml boto3 -r monitor/requirements-dashboard.txt
          python -c "import duckdb; print('duckdb', duckdb.__version__)"

      - name: Aggregate site reports
        if: github.event_name != 'workflow_dispatch' || inputs.backfill != true
        run: |
          FLAGS=""
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            FLAGS="--date $DATE"
          fi
          python monitor/aggregate_reports.py $FLAGS

      - name: Export flat tables to R2 (Parquet)
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python monitor/export_hub_tables.py \
              --backfill \
              --days "${{ github.event.inputs.backfill_days }}" \
              --from-r2
          else
            FLAGS="--from-r2"
            DATE="${{ github.event.inputs.date }}"
            if [ -n "$DATE" ]; then
              FLAGS="--date $DATE --from-r2"
            fi
            python monitor/export_hub_tables.py $FLAGS
          fi

      - name: Push flat tables to MotherDuck
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MOTHERDUCK_DATABASE: ${{ secrets.MOTHERDUCK_DATABASE }}
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python monitor/push_to_motherduck.py \
              --backfill \
              --days "${{ github.event.inputs.backfill_days }}" \
              --from-r2
          else
            FLAGS="--from-r2"
            DATE="${{ github.event.inputs.date }}"
            if [ -n "$DATE" ]; then
              FLAGS="--date $DATE --from-r2"
            fi
            python monitor/push_to_motherduck.py $FLAGS
          fi

      - name: Trigger Dashboard Refresh
        if: success() # Only triggers if the previous steps succeeded
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DASHBOARD_TRIGGER_TOKEN }}
          repository: futurefocusrecruitment6-ai/basex # Update this!
          event-type: monitor-hub-completed
          client-payload: '{"conclusion": "success", "branch": "${{ github.ref_name }}"}'