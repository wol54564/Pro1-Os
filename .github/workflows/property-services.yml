name: Property & Services Scrapers

on:
  workflow_run:
    workflows: ["Automotive Scrapers"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      category:
        description: 'Specific category to run (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - Property
          - Services
          - Dalil

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Only run if Automotive Scrapers completed successfully (or if manually triggered)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      matrix:
        category: 
          - Property
          - Services
          - Dalil
      fail-fast: false  # Continue running other scrapers even if one fails
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run ${{ matrix.category }} scraper
        if: ${{ !github.event.inputs.category || github.event.inputs.category == matrix.category }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: cd "${{ matrix.category }}" && python main.py
  
  update-pipeline-status:
    runs-on: ubuntu-latest
    needs: scrape
    if: ${{ success() }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create pipeline.json
        run: |
          echo '{
            "status": "Pipeline succeeded",
            "date": "'$(date -u +"%Y-%m-%d %H:%M:%S UTC")'",
            "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"
          }' > pipeline.json
      
      - name: Commit and push pipeline.json
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add pipeline.json
          git commit -m "Update pipeline status - $(date -u +"%Y-%m-%d %H:%M:%S UTC")" || echo "No changes to commit"
          git push
