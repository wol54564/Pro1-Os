name: Test 403 Fix (scrape.do – Animals)

on:
  workflow_dispatch:
    inputs:
      token:
        description: 'scrape.do API token (leave blank to use stored secret)'
        required: false
        default: ''
      target_url:
        description: 'Target URL to test'
        required: false
        default: 'https://www.q84sale.com/ar/animals'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-403-fix:
    name: Test scrape.do bypass on Animals page
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run 403-fix test
        env:
          # Priority: manual input → stored secret
          SCRAPEDO_TOKEN: ${{ github.event.inputs.token || secrets.SCRAPEDO_TOKEN }}
        run: |
          cd Animals
          python test_403_fix.py \
            --token "$SCRAPEDO_TOKEN" \
            --url "${{ github.event.inputs.target_url || 'https://www.q84sale.com/ar/animals' }}"
