name: "Test — Batch C"

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUTF8: '1'

jobs:

  # ── Job 1: calculate today's geo (Account 1 rotation) ───────────────────────
  calculate-geo:
    name: Calculate geo rotation
    runs-on: ubuntu-22.04
    outputs:
      geo: ${{ steps.geo.outputs.geo }}
    steps:
      - name: Determine geo from day-of-week
        id: geo
        run: |
          DOW=$(date +%w)   # 0=Sun 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat
          if [ "$DOW" = "0" ]; then
            GEO="eg"        # Sunday
          elif [ $(( DOW % 2 )) = "1" ]; then
            GEO="kw"        # Mon / Wed / Fri
          else
            GEO="sa"        # Tue / Thu / Sat
          fi
          echo "geo=$GEO" >> $GITHUB_OUTPUT
          echo "====================================="
          echo "Day=$DOW | Geo=__cr.$GEO"
          echo "====================================="

  # ── Job 2: scrape ────────────────────────────────────────────────────────────
  scrape:
    name: Scrape Test Batch C
    needs: calculate-geo
    runs-on: ubuntu-22.04
    env:
      DATAIMPULSE_USER: ${{ secrets.DATAIMPULSE_USER_1 }}__cr.${{ needs.calculate-geo.outputs.geo }}
      DATAIMPULSE_PASS: ${{ secrets.DATAIMPULSE_PASS_1 }}
      DATAIMPULSE_HOST: gw.dataimpulse.com
      DATAIMPULSE_PORT: '823'
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r CFl_data/requirements.txt

      - name: "[1/4] Property"
        run: cd CFl_data/Property && python main.py

      - name: "[2/4] New Car"
        run: cd "CFl_data/New Car" && python main.py

      - name: "[3/4] Rest-Automotive-Part1"
        run: cd CFl_data/Rest-Automotive-Part1 && python main.py

      - name: "[4/4] Jobs"
        run: cd CFl_data/Jobs && python main.py
