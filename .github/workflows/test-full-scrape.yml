name: Test Full Animals Scrape (scrape.do)

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Max listing pages per subcategory'
        required: false
        default: '2'
      max_details:
        description: 'Max detail-page fetches per subcategory (0 = skip details)'
        required: false
        default: '3'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  full-scrape-test:
    name: Full Animals scrape via scrape.do
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Root requirements.txt has beautifulsoup4, curl_cffi, aiohttp, etc.
        # Animals/requirements.txt adds boto3, pandas, openpyxl (needed by imports)
        run: |
          pip install -r requirements.txt
          pip install -r Animals/requirements.txt

      - name: Run full scrape test
        env:
          SCRAPEDO_TOKEN: ${{ secrets.SCRAPEDO_TOKEN }}
        run: |
          cd Animals
          python test_full_scrape.py \
            --max-pages ${{ github.event.inputs.max_pages || '2' }} \
            --max-details ${{ github.event.inputs.max_details || '3' }} \
            --output animals_test_output.json

      - name: Upload scrape output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: animals-scrape-output-${{ github.run_number }}
          path: Animals/animals_test_output.json
          retention-days: 7
