name: "Test — sp"

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUTF8: '1'

jobs:

  calculate-geo:
    name: Calculate 
    runs-on: ubuntu-22.04
    outputs:
      geo: ${{ steps.geo.outputs.geo }}
    steps:
      - name: Determine 
        id: geo
        run: |
          DOW=$(date +%w)   # 0=Sun 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat
          if [ "$DOW" = "0" ]; then
            GEO="eg"        # Sunday
          elif [ $(( DOW % 2 )) = "1" ]; then
            GEO="kw"        # Mon / Wed / Fri
          else
            GEO="sa"        # Tue / Thu / Sat
        

  # ── Job 2: scrape ────────────────────────────────────────────────────────────
  scrape:
    name: Scrape Test Batch C
    needs: calculate-geo
    runs-on: ubuntu-22.04
    env:
      DATAIMPULSE_USER: ${{ secrets.DATAIMPULSE_USER_1 }}__cr.${{ needs.calculate-geo.outputs.geo }}
      DATAIMPULSE_PASS: ${{ secrets.DATAIMPULSE_PASS_1 }}
      DATAIMPULSE_HOST: gw.dataimpulse.com
      DATAIMPULSE_PORT: '823'
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r CFl_data/requirements.txt

      - name: "Sport"
        run: cd CFl_data/Sport && python main.py
